# MQTrace Mosquitto Configuration
# Location: place this file at your Mosquitto config directory and restart the broker.
#
# Windows: C:\Program Files\mosquitto\mosquitto.conf
# Ubuntu:  /etc/mosquitto/conf.d/mqtrace.conf
# macOS:   /usr/local/etc/mosquitto/mosquitto.conf
#
# M-03 IMPLEMENTATION: Persistent client sessions + increased queue limits.
# This prevents message loss when the Rails subscriber processes messages
# slower than they arrive (e.g. during high-throughput bursts).

# ── Network ─────────────────────────────────────────────────────────────────
listener 1883
allow_anonymous true

# ── Queue & In-flight limits ─────────────────────────────────────────────────
# max_queued_messages: How many QoS 1/2 messages Mosquitto will queue per
# subscriber when the client is slow or temporarily disconnected.
# Default in older Mosquitto: 100. This raises it to 50,000.
max_queued_messages 50000

# max_inflight_messages: Max QoS 1/2 messages in-flight simultaneously per client.
# 0 = unlimited. Allows the Rails subscriber to handle a large burst window.
max_inflight_messages 0

# max_inflight_bytes: Max bytes allowed in-flight. 0 = unlimited.
max_inflight_bytes 0

# queue_qos0_messages: Also queue QoS 0 messages for persistent clients.
# Useful if we ever switch the simulator to QoS 0 for lower overhead.
queue_qos0_messages false

# ── Persistent session settings ──────────────────────────────────────────────
# persistent_client_expiration: How long to keep messages for a disconnected
# persistent client. 1h means if Rails restarts within 1 hour, queued
# messages will be delivered on reconnect.
persistent_client_expiration 1h

# ── Logging ──────────────────────────────────────────────────────────────────
log_type error
log_type warning
log_type notice
log_type information
